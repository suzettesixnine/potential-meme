<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Recipe Box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pantry: #26443B;
    --pantry-dark: #1B332C;
    --card: #FBF6EA;
    --card-line: #E4DAC3;
    --mustard: #D9A73B;
    --mustard-dark: #A87A20;
    --rust: #AE472E;
    --ink: #2B2620;
    --ink-soft: #6B6459;
    --paper: #F4EFE2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--paper);
    color:var(--ink);
  }
  .app{max-width:920px;margin:0 auto;padding:0 0 4rem;}

  header{
    background:var(--pantry);
    color:var(--paper);
    padding:2.2rem 1.5rem 4.2rem;
    position:relative;
    overflow:hidden;
  }
  header .eyebrow{
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--mustard);
    font-weight:600;
    margin:0 0 .4rem;
  }
  header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(28px,6vw,42px);
    margin:0 0 .3rem;
    line-height:1.05;
  }
  header p{
    margin:0;
    color:#CFE0D8;
    font-size:14.5px;
    max-width:520px;
  }
  header .sheet-link{
    display:inline-flex;align-items:center;gap:6px;
    margin-top:.9rem;
    font-size:12.5px;font-weight:600;
    color:var(--paper);
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.25);
    border-radius:999px;
    padding:.4rem .85rem;
    text-decoration:none;
  }
  .ring-row{position:absolute;top:14px;left:0;right:0;display:flex;justify-content:center;gap:34px;}
  .ring{width:14px;height:14px;border-radius:50%;background:var(--paper);opacity:.18;}

  .box-controls{
    background:var(--card);
    margin:0 1.25rem;
    margin-top:-2.6rem;
    border-radius:14px;
    border:1px solid var(--card-line);
    padding:1.1rem 1.1rem 0.9rem;
    position:relative;
  }
  .search-row{display:flex;gap:8px;align-items:center;}
  .search-strip{
    flex:1;
    display:flex;
    align-items:center;
    gap:.6rem;
    background:var(--paper);
    border:1px solid var(--card-line);
    border-radius:9px;
    padding:.55rem .8rem;
  }
  .search-strip input{
    border:none;
    background:transparent;
    outline:none;
    font-family:'Inter',sans-serif;
    font-size:15px;
    color:var(--ink);
    width:100%;
  }
  .search-strip input::placeholder{color:var(--ink-soft);}
  .refresh-btn{
    flex:none;
    width:38px;height:38px;
    border-radius:9px;
    border:1px solid var(--card-line);
    background:var(--paper);
    color:var(--pantry);
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .refresh-btn:active{transform:scale(.95);}
  .status-line{
    font-size:12px;
    color:var(--ink-soft);
    margin-top:.6rem;
    min-height:16px;
  }
  .status-line.error{color:var(--rust);}
  .tabs{
    display:flex;
    gap:6px;
    margin-top:.5rem;
    flex-wrap:wrap;
  }
  .tab{
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:.02em;
    padding:.4rem .78rem;
    border-radius:999px;
    border:1px solid var(--card-line);
    background:var(--paper);
    color:var(--ink-soft);
    cursor:pointer;
    user-select:none;
  }
  .tab.active{
    background:var(--pantry);
    border-color:var(--pantry);
    color:var(--paper);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:14px;
    padding:1.6rem 1.25rem 0;
  }
  .rcard{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:12px;
    padding:1.1rem 1.1rem 1rem;
    cursor:pointer;
    position:relative;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .rcard:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(38,68,59,.12);}
  .rcard .punch{
    width:11px;height:11px;border-radius:50%;
    background:var(--paper);border:1px solid var(--card-line);
    position:absolute;top:14px;left:14px;
  }
  .rcard-top{display:flex;justify-content:space-between;align-items:flex-start;padding-left:22px;gap:8px;}
  .rcard h3{
    font-family:'Fraunces',serif;
    font-size:19px;
    font-weight:600;
    margin:0;
    line-height:1.2;
  }
  .stars{color:var(--mustard-dark);font-size:12.5px;white-space:nowrap;margin-top:2px;}
  .meal-badge{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    letter-spacing:.03em;
    color:var(--rust);
    text-transform:uppercase;
    margin:.5rem 0 .4rem 22px;
  }
  .rcard .tags{
    padding-left:22px;
    font-size:12.5px;
    color:var(--ink-soft);
    margin-bottom:.6rem;
  }
  .rcard .meta-row{
    display:flex;
    gap:14px;
    padding-left:22px;
    font-size:12px;
    color:var(--ink-soft);
    border-top:1px dashed var(--card-line);
    padding-top:.6rem;
    margin-top:.2rem;
  }
  .no-results, .loading-msg{
    padding:2.5rem 1.25rem;
    text-align:center;
    color:var(--ink-soft);
    font-size:14.5px;
  }

  .detail{padding:1.6rem 1.25rem 0;display:none;}
  .back-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:none;border:none;color:var(--pantry);
    font-family:'Inter',sans-serif;font-weight:600;font-size:13.5px;
    cursor:pointer;padding:0;margin-bottom:1rem;
  }
  .card-sheet{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:14px;
    padding:1.6rem 1.6rem 1.4rem;
    position:relative;
  }
  .card-sheet .ring-mini{position:absolute;top:16px;left:0;right:0;display:flex;justify-content:center;gap:30px;}
  .card-sheet .ring-mini span{width:10px;height:10px;border-radius:50%;background:var(--paper);border:1px solid var(--card-line);}
  .detail-head{padding-top:16px;text-align:center;border-bottom:1px dashed var(--card-line);padding-bottom:1.1rem;margin-bottom:1.3rem;}
  .detail-head .meal-badge{padding-left:0;margin:0 0 .4rem;}
  .detail-head h2{
    font-family:'Fraunces',serif;font-weight:600;font-size:clamp(24px,4vw,30px);margin:0 0 .5rem;
  }
  .detail-stats{display:flex;justify-content:center;gap:18px;font-size:13px;color:var(--ink-soft);flex-wrap:wrap;}
  .detail-stats b{color:var(--ink);font-weight:600;}
  .tag-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-top:.7rem;}
  .tag-chip{
    font-size:11.5px;font-weight:600;color:var(--pantry);
    background:rgba(38,68,59,.08);
    border-radius:999px;padding:.25rem .7rem;
  }
  .flag{
    background:rgba(174,71,46,.09);
    border:1px solid rgba(174,71,46,.25);
    color:var(--rust);
    font-size:12.5px;
    border-radius:8px;
    padding:.55rem .75rem;
    margin:0 0 1.1rem;
  }
  .notes-block{
    margin-top:1.6rem;
    padding-top:1.2rem;
    border-top:1px dashed var(--card-line);
  }
  .notes-block .col-title{margin-bottom:.5rem;}
  .notes-body{
    font-size:14.5px;
    line-height:1.65;
    color:var(--ink);
    background:var(--paper);
    border:1px solid var(--card-line);
    border-radius:9px;
    padding:.8rem .95rem;
    white-space:pre-wrap;
  }
  .cols{display:grid;grid-template-columns:1fr;gap:1.6rem;}
  @media(min-width:640px){.cols{grid-template-columns:0.85fr 1.15fr;}}
  .col-title{
    font-family:'Fraunces',serif;font-weight:600;font-size:15px;
    text-transform:uppercase;letter-spacing:.04em;color:var(--pantry);
    margin:0 0 .7rem;
  }
  .ing-list{list-style:none;margin:0;padding:0;}
  .ing-list li{
    display:flex;align-items:baseline;gap:8px;
    font-size:14.5px;padding:.42rem 0;
    border-bottom:1px solid var(--card-line);
  }
  .ing-list li:last-child{border-bottom:none;}
  .ing-amt{color:var(--mustard-dark);font-weight:600;min-width:78px;}
  .steps{list-style:none;margin:0;padding:0;counter-reset:step;}
  .steps li{
    counter-increment:step;
    display:flex;gap:.7rem;
    font-size:14.5px;line-height:1.6;
    padding:.5rem 0;
  }
  .steps li::before{
    content:counter(step);
    flex:none;width:22px;height:22px;border-radius:50%;
    background:var(--pantry);color:var(--paper);
    font-size:12px;font-weight:600;
    display:flex;align-items:center;justify-content:center;
    margin-top:1px;
  }
  .nutrition{
    margin-top:1.6rem;padding-top:1.2rem;border-top:1px dashed var(--card-line);
  }
  .nutrition .col-title{text-align:center;}
  .nutri-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  }
  .nutri-cell{
    background:var(--paper);border:1px solid var(--card-line);border-radius:9px;
    padding:.6rem .3rem;text-align:center;
  }
  .nutri-cell .n{font-weight:700;font-size:15px;}
  .nutri-cell .l{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;}
  @media(max-width:480px){.nutri-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="ring-row"><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
    <p class="eyebrow">Suzette's kitchen</p>
    <h1>The Recipe Box</h1>
    <p>Every recipe you've cultivated, synced live from your Sheet.</p>
    <a class="sheet-link" href="https://docs.google.com/spreadsheets/d/1AmN2Ul9V4Yrc-qfpC_LdO-J4GTfionw6P7g57IoI6uE/edit" target="_blank" rel="noopener">Add a recipe in Sheets &#8594;</a>
  </header>

  <div class="box-controls">
    <div class="search-row">
      <div class="search-strip">
        <span style="font-size:15px;">&#128269;</span>
        <input id="searchInput" type="text" placeholder="Search recipes, ingredients, or tags...">
      </div>
      <button class="refresh-btn" id="refreshBtn" title="Refresh from Sheet" aria-label="Refresh from Sheet">&#8635;</button>
    </div>
    <div class="tabs" id="tabs"></div>
    <div class="status-line" id="statusLine">Loading your recipes...</div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="no-results" id="noResults" style="display:none;">Nothing in the box matches that search yet.</div>
  <div class="loading-msg" id="loadingMsg">Fetching recipes from your Google Sheet...</div>

  <div class="detail" id="detail">
    <button class="back-btn" onclick="showList()">&#8592; Back to the box</button>
    <div class="card-sheet">
      <div class="ring-mini"><span></span><span></span><span></span></div>
      <div id="detailBody"></div>
    </div>
  </div>
</div>

<script>
const SHEET_ID = "1AmN2Ul9V4Yrc-qfpC_LdO-J4GTfionw6P7g57IoI6uE";
const RECIPES_TAB = "Recipes";
const INGREDIENTS_TAB = "Ingredients";
const CACHE_KEY = "recipeBoxCache_v1";
const CACHE_TIME_KEY = "recipeBoxCacheTime_v1";

let RECIPES = [];
let activeTab = "All";
let searchTerm = "";

function loadSheet(sheetName){
  return new Promise((resolve, reject)=>{
    const cbName = "gvizCB_" + sheetName.replace(/[^a-zA-Z0-9]/g,"") + "_" + Date.now() + "_" + Math.floor(Math.random()*10000);
    let settled = false;
    window[cbName] = function(json){
      settled = true;
      resolve(json.table);
      delete window[cbName];
      if(scriptEl && scriptEl.parentNode) scriptEl.parentNode.removeChild(scriptEl);
    };
    const url = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json;responseHandler:" + cbName +
                "&sheet=" + encodeURIComponent(sheetName) + "&headers=1";
    const scriptEl = document.createElement('script');
    scriptEl.src = url;
    scriptEl.onerror = function(){
      if(!settled) reject(new Error("Couldn't reach \"" + sheetName + "\" — check the sheet's share setting or your connection."));
    };
    document.body.appendChild(scriptEl);
    setTimeout(function(){
      if(!settled){
        settled = true;
        reject(new Error("Timed out loading \"" + sheetName + "\"."));
      }
    }, 12000);
  });
}

function colIndex(cols, names){
  for(let i=0;i<cols.length;i++){
    const label = (cols[i].label || "").trim().toLowerCase();
    if(names.some(n=>n.toLowerCase()===label)) return i;
  }
  return -1;
}

function cellVal(row, idx){
  if(idx<0 || !row.c) return "";
  const c = row.c[idx];
  return (c && c.v!==null && c.v!==undefined) ? c.v : "";
}

async function loadData(isRefresh){
  const statusLine = document.getElementById('statusLine');
  const loadingMsg = document.getElementById('loadingMsg');
  if(!isRefresh){
    loadingMsg.style.display = "block";
    document.getElementById('grid').style.display = "none";
  }
  statusLine.className = "status-line";
  statusLine.textContent = isRefresh ? "Refreshing..." : "Loading your recipes...";

  try{
    const results = await Promise.all([loadSheet(RECIPES_TAB), loadSheet(INGREDIENTS_TAB)]);
    const recipesTable = results[0];
    const ingredientsTable = results[1];

    const rCols = recipesTable.cols;
    const idxID = colIndex(rCols, ["ID"]);
    const idxName = colIndex(rCols, ["Name"]);
    const idxInstructions = colIndex(rCols, ["Instructions"]);
    const idxRating = colIndex(rCols, ["Rating"]);
    const idxTags = colIndex(rCols, ["Tags"]);
    const idxMeal = colIndex(rCols, ["Meal"]);
    const idxProtein = colIndex(rCols, ["Protein Type"]);
    const idxServings = colIndex(rCols, ["Servings"]);
    const idxKcal = colIndex(rCols, ["Kcal"]);
    const idxProteinG = colIndex(rCols, ["Protein"]);
    const idxFat = colIndex(rCols, ["Fat"]);
    const idxCarb = colIndex(rCols, ["Carb"]);
    const idxSatFat = colIndex(rCols, ["Saturated Fat"]);
    const idxFiber = colIndex(rCols, ["Fiber"]);
    const idxTransFat = colIndex(rCols, ["Trans Fat"]);
    const idxSodium = colIndex(rCols, ["Sodium"]);
    const idxNotes = colIndex(rCols, ["Notes"]);

    const recipes = [];
    recipesTable.rows.forEach(function(row){
      if(!row || !row.c) return;
      const name = cellVal(row, idxName);
      if(!name) return;
      const instructionsRaw = String(cellVal(row, idxInstructions) || "");
      const steps = instructionsRaw.split(/\d+\.\s*/).map(function(s){return s.trim();}).filter(Boolean);
      const tagsRaw = String(cellVal(row, idxTags) || "");
      const tags = tagsRaw.split(",").map(function(t){return t.trim();}).filter(Boolean);
      recipes.push({
        id: cellVal(row, idxID) || name,
        name: name,
        meal: cellVal(row, idxMeal) || "Other",
        protein: cellVal(row, idxProtein) || "",
        rating: Number(cellVal(row, idxRating)) || 0,
        servings: Number(cellVal(row, idxServings)) || 1,
        tags: tags,
        steps: steps,
        ingredients: [],
        notes: cellVal(row, idxNotes) || "",
        nutrition: {
          kcal: cellVal(row, idxKcal) || "",
          protein: cellVal(row, idxProteinG) || "",
          fat: cellVal(row, idxFat) || "",
          carb: cellVal(row, idxCarb) || "",
          satFat: cellVal(row, idxSatFat) || "",
          fiber: cellVal(row, idxFiber) || "",
          transFat: cellVal(row, idxTransFat) || "",
          sodium: cellVal(row, idxSodium) || ""
        }
      });
    });

    const iCols = ingredientsTable.cols;
    const iIdxName = colIndex(iCols, ["Name"]);
    const iIdxAmount = colIndex(iCols, ["Amount"]);
    const iIdxMeasurement = colIndex(iCols, ["Measurement"]);
    const iIdxRecipe = colIndex(iCols, ["Recipe"]);

    ingredientsTable.rows.forEach(function(row){
      if(!row || !row.c) return;
      const recipeName = cellVal(row, iIdxRecipe);
      if(!recipeName) return;
      const match = recipes.find(function(r){
        return r.name.trim().toLowerCase() === String(recipeName).trim().toLowerCase();
      });
      if(!match) return;
      match.ingredients.push([
        cellVal(row, iIdxAmount) || "",
        cellVal(row, iIdxMeasurement) || "",
        cellVal(row, iIdxName) || ""
      ]);
    });

    RECIPES = recipes;
    try{
      localStorage.setItem(CACHE_KEY, JSON.stringify(RECIPES));
      localStorage.setItem(CACHE_TIME_KEY, new Date().toISOString());
    }catch(e){}

    loadingMsg.style.display = "none";
    document.getElementById('grid').style.display = "grid";
    renderTabs();
    renderGrid();
    statusLine.textContent = "Updated just now · " + RECIPES.length + " recipes";
  }catch(err){
    let cached = null;
    try{ cached = localStorage.getItem(CACHE_KEY); }catch(e){}
    loadingMsg.style.display = "none";
    if(cached){
      RECIPES = JSON.parse(cached);
      document.getElementById('grid').style.display = "grid";
      renderTabs();
      renderGrid();
      const when = (function(){
        try{ return localStorage.getItem(CACHE_TIME_KEY) || "earlier"; }catch(e){ return "earlier"; }
      })();
      statusLine.className = "status-line error";
      statusLine.textContent = err.message + " Showing your last saved copy.";
    } else {
      statusLine.className = "status-line error";
      statusLine.textContent = err.message + " Make sure the Sheet is shared as \"Anyone with the link - Viewer.\"";
    }
  }
}

function stars(n){
  n = Math.round(Number(n) || 0);
  let out = "";
  for(let i=0;i<5;i++){ out += i < n ? "&#9733;" : "&#9734;"; }
  return out;
}

function mealsPresent(){
  const order = ["Breakfast","Lunch","Dinner","Snack"];
  const found = Array.from(new Set(RECIPES.map(function(r){return r.meal;})));
  const known = order.filter(function(m){return found.includes(m);});
  const other = found.filter(function(m){return !order.includes(m);});
  return ["All"].concat(known, other);
}

function renderTabs(){
  const wrap = document.getElementById('tabs');
  wrap.innerHTML = "";
  mealsPresent().forEach(function(m){
    const el = document.createElement('div');
    el.className = "tab" + (m===activeTab ? " active" : "");
    el.textContent = m;
    el.onclick = function(){ activeTab = m; renderTabs(); renderGrid(); };
    wrap.appendChild(el);
  });
}

function matches(r, q){
  if(!q) return true;
  q = q.toLowerCase();
  if(r.name.toLowerCase().includes(q)) return true;
  if(r.tags.some(function(t){return t.toLowerCase().includes(q);})) return true;
  if(r.protein.toLowerCase().includes(q)) return true;
  if(r.ingredients.some(function(i){return String(i[2]).toLowerCase().includes(q);})) return true;
  return false;
}

function renderGrid(){
  const grid = document.getElementById('grid');
  const noResults = document.getElementById('noResults');
  grid.innerHTML = "";
  const list = RECIPES.filter(function(r){
    return (activeTab==="All" || r.meal===activeTab) && matches(r, searchTerm);
  });
  if(list.length === 0){
    noResults.style.display = "block";
    return;
  }
  noResults.style.display = "none";
  list.forEach(function(r){
    const card = document.createElement('div');
    card.className = "rcard";
    card.onclick = function(){ showDetail(r.id); };
    card.innerHTML =
      '<div class="punch"></div>' +
      '<div class="rcard-top"><h3>' + r.name + '</h3><div class="stars">' + stars(r.rating) + '</div></div>' +
      '<div class="meal-badge">' + r.meal + ' &middot; ' + r.protein + '</div>' +
      '<div class="tags">' + r.tags.join(" &middot; ") + '</div>' +
      '<div class="meta-row"><span>' + (r.nutrition.kcal || "?") + ' kcal</span><span>Serves ' + r.servings + '</span><span>' + r.ingredients.length + ' ingredients</span></div>';
    grid.appendChild(card);
  });
}

function showDetail(id){
  const r = RECIPES.find(function(x){return x.id===id;});
  if(!r) return;
  document.getElementById('grid').style.display = "none";
  document.getElementById('noResults').style.display = "none";
  document.querySelector('.box-controls').style.display = "none";
  document.getElementById('detail').style.display = "block";

  const body = document.getElementById('detailBody');
  const ingHtml = r.ingredients.map(function(i){
    return '<li><span class="ing-amt">' + i[0] + ' ' + i[1] + '</span><span>' + i[2] + '</span></li>';
  }).join("");
  const stepHtml = r.steps.map(function(s){ return '<li>' + s + '</li>'; }).join("");
  const tagHtml = r.tags.map(function(t){ return '<span class="tag-chip">' + t + '</span>'; }).join("");

  body.innerHTML =
    '<div class="detail-head">' +
      '<div class="meal-badge">' + r.meal + ' &middot; ' + r.protein + '</div>' +
      '<h2>' + r.name + '</h2>' +
      '<div class="detail-stats"><span>' + stars(r.rating) + '</span><span><b>' + r.servings + '</b> serving' + (r.servings>1?"s":"") + '</span><span><b>' + (r.nutrition.kcal || "?") + '</b> kcal</span></div>' +
      '<div class="tag-row">' + tagHtml + '</div>' +
    '</div>' +
    '<div class="cols">' +
      '<div><p class="col-title">Ingredients</p><ul class="ing-list">' + (ingHtml || '<li style="color:var(--ink-soft);border:none;">No ingredients listed yet.</li>') + '</ul></div>' +
      '<div><p class="col-title">Instructions</p><ul class="steps">' + (stepHtml || '<li style="color:var(--ink-soft);">No instructions listed yet.</li>') + '</ul></div>' +
    '</div>' +
    (r.notes ? '<div class="notes-block"><p class="col-title">Notes &amp; Substitutions</p><div class="notes-body">' + r.notes + '</div></div>' : '') +
    '<div class="nutrition"><p class="col-title">Per serving</p><div class="nutri-grid">' +
      '<div class="nutri-cell"><div class="n">' + (r.nutrition.protein||"-") + '</div><div class="l">Protein</div></div>' +
      '<div class="nutri-cell"><div class="n">' + (r.nutrition.fat||"-") + '</div><div class="l">Fat</div></div>' +
      '<div class="nutri-cell"><div class="n">' + (r.nutrition.carb||"-") + '</div><div class="l">Carbs</div></div>' +
      '<div class="nutri-cell"><div class="n">' + (r.nutrition.fiber||"-") + '</div><div class="l">Fiber</div></div>' +
      '<div class="nutri-cell"><div class="n">' + (r.nutrition.satFat||"-") + '</div><div class="l">Sat. fat</div></div>' +
      '<div class="nutri-cell"><div class="n">' + (r.nutrition.transFat||"-") + '</div><div class="l">Trans fat</div></div>' +
      '<div class="nutri-cell"><div class="n">' + (r.nutrition.sodium||"-") + '</div><div class="l">Sodium</div></div>' +
      '<div class="nutri-cell"><div class="n">' + (r.nutrition.kcal||"-") + '</div><div class="l">Calories</div></div>' +
    '</div></div>';

  window.scrollTo({top:0, behavior:"smooth"});
}

function showList(){
  document.getElementById('detail').style.display = "none";
  document.querySelector('.box-controls').style.display = "block";
  document.getElementById('grid').style.display = "grid";
  renderGrid();
}

document.getElementById('searchInput').addEventListener('input', function(e){
  searchTerm = e.target.value;
  renderGrid();
});
document.getElementById('refreshBtn').addEventListener('click', function(){
  loadData(true);
});

loadData(false);
</script>
</body>
</html>
